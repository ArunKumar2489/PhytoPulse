<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhytoPulse | Encyclopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            900: '#0a192f',
                            800: '#112240',
                            700: '#233554',
                            light: '#64ffda',
                            accent: '#4ade80'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body
    class="bg-brand-900 text-slate-300 font-sans h-screen overflow-hidden flex flex-col antialiased selection:bg-brand-light selection:text-brand-900">
    <div
        class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-brand-800 via-brand-900 to-black opacity-80 pointer-events-none">
    </div>

    <nav class="w-full glass-panel border-b border-white/10 px-8 py-4 sticky top-0 z-50 shrink-0">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-light to-brand-accent flex items-center justify-center text-brand-900 font-bold text-xl shadow-[0_0_15px_rgba(100,255,218,0.5)]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                        </path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Global Solutions <span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-brand-light to-brand-accent">Database</span>
                </h1>
            </div>
            <div class="flex gap-6 items-center">
                <a href="index.html" class="text-slate-300 hover:text-white transition-colors">Home</a>
                <a href="dashboard.html" class="text-slate-300 hover:text-white transition-colors">Live Dashboard</a>
                <a href="encyclopedia.html"
                    class="text-brand-light font-medium hover:text-white transition-colors border-b-2 border-brand-light pb-1">Encyclopedia</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto w-full max-w-7xl mx-auto p-8 space-y-8 scrollbar-hide">

        <!-- Header Section -->
        <div>
            <h2 class="text-3xl font-extrabold text-white mb-2">Crop Profiles & Treatment Center</h2>
            <p class="text-slate-400 max-w-2xl">Access detailed knowledge graphs on physiological signals, stress
                detection methods, and actionable treatments.</p>
        </div>

        <div class="flex gap-8 h-full">
            <!-- Sidebar Selection -->
            <div class="w-64 shrink-0 space-y-4">
                <div
                    class="glass-panel border border-brand-light/20 rounded-xl p-4 flex flex-col gap-2 relative bg-brand-800/40">
                    <h3 class="text-xs uppercase tracking-widest text-brand-light font-bold mb-2">Select Species</h3>

                    <button
                        class="profile-btn active w-full text-left px-4 py-3 rounded-lg bg-brand-light/10 text-white border border-brand-light/30 transition-all"
                        data-crop="Tomato">
                        Tomato
                    </button>
                    <button
                        class="profile-btn w-full text-left px-4 py-3 rounded-lg text-slate-400 hover:bg-white/5 hover:text-white border border-transparent transition-all"
                        data-crop="Rice">
                        Rice
                    </button>
                    <button
                        class="profile-btn w-full text-left px-4 py-3 rounded-lg text-slate-400 hover:bg-white/5 hover:text-white border border-transparent transition-all"
                        data-crop="Aloe Vera">
                        Aloe Vera
                    </button>
                    <button
                        class="profile-btn w-full text-left px-4 py-3 rounded-lg text-slate-400 hover:bg-white/5 hover:text-white border border-transparent transition-all"
                        data-crop="Corn">
                        Corn
                    </button>
                </div>
            </div>

            <!-- Content Display -->
            <div class="flex-1 h-full min-h-[500px]">
                <div id="profile-content"
                    class="glass-panel border border-white/10 rounded-2xl p-8 h-full bg-brand-900/40 animate-fade-in-up">
                    <!-- Dynamic content loads here via JS -->
                </div>
            </div>

        </div>
    </main>

    <script src="./js/encyclopedia.js"></script>
    <script src="./js/store.js"></script>
    <script src="./js/api.js"></script>
</body>

</html>
